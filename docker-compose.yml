# MentorMe — production stack: Postgres + one-shot migrator + Next.js app + Caddy (auto-HTTPS).
# Usage on the server:
#   docker compose --env-file .env.production up -d --build
#   docker compose --env-file .env.production --profile seed run --rm seed   # first deploy only
#
# `migrate` runs `prisma migrate deploy` (idempotent) on every `up` and the app waits
# for it to finish before starting.

services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      target: migrator
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # One-off seeding — does NOT run automatically. Run on first deploy only:
  #   docker compose --env-file .env.production --profile seed run --rm seed
  seed:
    build:
      context: .
      target: migrator
    env_file: .env.production
    command: ["npx", "prisma", "db", "seed"]
    profiles: ["seed"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    env_file: .env.production
    expose:
      - "3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  uploads:
  caddy-data:
  caddy-config:
